<!doctype html>
<html lang="en" data-codex-window-type="electron" class="electron-dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Codex Purple Gradient Skin Mock DOM</title>
  <meta name="description" content="Public-safe anonymized DOM export for the Codex purple gradient skin screenshot.">
</head>
<body>
  <div id="root">
    <main class="app-shell purple-gradient-skin" aria-label="Codex">
      <aside class="app-shell-left-panel" aria-label="Sidebar">
        <nav aria-label="Primary">
          <button>New chat</button>
          <button>Search</button>
          <button>Plugins</button>
          <button>Automations</button>
        </nav>

        <section aria-labelledby="pinned-heading">
          <h2 id="pinned-heading">Pinned</h2>
          <ol class="chat-list">
            <li><button>Refactor dashboard layout</button><time>1m</time></li>
            <li><button>Tune onboarding flow</button><time>1m</time></li>
          </ol>
        </section>

        <section aria-labelledby="all-chats-heading">
          <h2 id="all-chats-heading">All chats</h2>
          <div class="sidebar-actions" aria-label="Chat list actions">
            <button aria-label="More options">...</button>
            <button aria-label="New folder"></button>
            <button aria-label="New chat"></button>
          </div>
          <ol class="chat-list">
            <li><button>Review API error states</button><time>3m</time></li>
            <li><button>Polish settings panel</button><time>1h</time></li>
            <li><button>Plan release checklist</button><time>1h</time></li>
            <li><button>Clean up test fixtures</button><time>2h</time></li>
            <li><button>Profile token usage</button><time>3h</time></li>
            <li><button>Draft migration notes</button><time>3h</time></li>
            <li><button>Design search filters</button><time>4h</time></li>
            <li><button>Organize sample data</button><time>5h</time></li>
          </ol>
          <button class="show-more">Show more</button>
        </section>

        <button class="settings">Settings</button>
      </aside>

      <section class="main-surface" aria-label="Start screen">
        <header class="app-header">
          <button aria-label="Toggle sidebar"></button>
          <button aria-label="Back"></button>
          <button aria-label="Forward"></button>
          <button>Update</button>
        </header>

        <section class="start-panel">
          <h1>What should we work on in Code?</h1>
          <form class="composer" aria-label="Composer">
            <label for="composer-input">Do anything</label>
            <textarea id="composer-input" placeholder="Do anything"></textarea>
            <div class="composer-toolbar">
              <button aria-label="Add context">+</button>
              <button>Full access</button>
              <button>5.5 Low</button>
              <button aria-label="Voice input"></button>
              <button aria-label="Send"></button>
            </div>
            <div class="composer-context">
              <button>Code</button>
            </div>
          </form>

          <section class="connector-cards" aria-label="Connectors">
            <article>
              <h2>Connect messaging</h2>
              <p>Get context from recent team discussions</p>
            </article>
            <article>
              <h2>Connect email</h2>
              <p>Summarize stakeholder asks from email</p>
            </article>
            <article>
              <h2>Connect files</h2>
              <p>Review results, research, and plans</p>
            </article>
          </section>
        </section>
      </section>
    </main>
  </div>
</body>
</html>
